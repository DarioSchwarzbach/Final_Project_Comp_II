name: Fetch NFL and Crime Data

on:
  push:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      run_fetch_data:
        description: 'Run the fetch-data job?'
        required: true
        type: boolean
        default: false

jobs:
  # --- JOB 1: The API Monitor ---
  check-api:
    runs-on: ubuntu-latest
    steps:
      - name: Check Chicago Data Portal API
        run: |
          curl --silent --show-error --fail -I "https://data.cityofchicago.org/resource/ijzp-q8t2.json"

  # --- JOB 2: The Data Fetcher ---
  fetch-data:
    needs: check-api
    # ONLY run if triggered manually AND the checkbox is true
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_fetch_data == true }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nflreadpy polars pandas requests 

      - name: Run script
        run: python fetch_data.py

      - name: Upload CSV Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: game-and-crime-data
          path: data/*.csv