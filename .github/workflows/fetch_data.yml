name: Generate and Upload CSV

on:
  push:
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13' 
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install polars nflreadpy

      - name: Run script
        run: python data_acquisition/fetch_nfl.py

      - name: Upload CSV Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bears_games_csv
          path: data/bears_games_2001*.csv
